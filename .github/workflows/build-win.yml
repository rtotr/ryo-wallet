name: workflows/build-win

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-win:
    name: 'Windows (.zip)'
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: git config (rewrite protocol)
        run: git config --global url.https://github.com/.insteadOf git://github.com/
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '12.22.12'
      - name: install vs 2017 build tools
        run: |
          choco install --no-progress -y visualstudio2017buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.MSBuildTools;includeRecommended --add Microsoft.VisualStudio.Workload.VCTools;includeRecommended --add Microsoft.VisualStudio.Component.VC.140"
      - name: get latest ryo release tag
        run: |
          $L_TAG = & gh release list --repo rtotr/ryo-currency --json tagName,isLatest --jq '.[] | select(.isLatest)|.tagName'
          echo ("LATEST_TAG=$L_TAG") >> $env:GITHUB_ENV
      - name: download latest ryo release
        run: gh release download --repo rtotr/ryo-currency --dir bin --pattern ryo-*-win-x64.7z
      - name: unpack ryo archive
        run: |
          7z x ryo-${{ env.LATEST_TAG }}-win-x64.7z ryod.exe ryo-wallet-rpc.exe
          Remove-Item ryo-${{ env.LATEST_TAG }}-win-x64.7z
          Get-ChildItem -Path . -File -Name
        working-directory: bin
      - name: update versions in packages.json
        if: github.ref_type == 'tag'
        run: |
          $content = Get-Content package.json -Raw | ConvertFrom-Json
          $content.version = "${{ github.ref_name }}"
          $content.daemonVersion = "${{ env.LATEST_TAG }}"
          $content | ConvertTo-Json -Depth 32 | Set-Content package.json
      - name: npm install
        run: npm install
      - name: build
        run: |
          npm run rebuild
          npm run build
      - name: repack zip to 7z
        run: |
          New-Item -ItemType Directory -Force -Path temp_extract
          7z x dist/electron-mat/Packaged/ryo-wallet-win-x64.zip -otemp_extract
          7z a -t7z dist/electron-mat/Packaged/ryo-wallet-win-x64.7z temp_extract/*
          Remove-Item -Recurse -Force temp_extract
          Remove-Item dist/electron-mat/Packaged/ryo-wallet-win-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.job }} # job names must start with 'build-' for the release workflow to work correctly
          path: dist/electron-mat/Packaged/ryo-wallet-win-x64.7z
